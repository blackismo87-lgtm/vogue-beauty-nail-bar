<!DOCTYPE html>

<html class="dark" lang="fr"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec1313",
              "background-light": "#f8f6f6",
              "background-dark": "#0a0505",
            },
            fontFamily: {
              "display": ["Noto Serif", "serif"],
              "sans": ["Noto Sans", "sans-serif"]

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        body {
            font-family: 'Noto Sans', sans-serif;
        }
        .font-display {
            font-family: 'Noto Serif', serif;
        }
        .glass-glow {
            box-shadow: 0 0 15px rgba(236, 19, 19, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-transparent opacity-80"></div>

</div>
</div>
<div class="flex px-6 py-4">
<div class="flex h-12 flex-1 items-center justify-center rounded-full bg-slate-200 dark:bg-primary/10 p-1 border border-primary/20 glass-glow">

<span class="truncate">Se connecter</span>
<input checked="" class="invisible w-0" name="auth_mode" type="radio" value="login"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-4 transition-all has-[:checked]:bg-primary has-[:checked]:text-white text-slate-500 dark:text-slate-400 text-sm font-medium">
<span class="truncate">S'inscrire</span>
<input class="invisible w-0" name="auth_mode" type="radio" value="register"/>
</label>
</div>
</div>
<div class="flex flex-col gap-1 px-6 py-3">

<input class="form-input flex flex-1 border-0 bg-transparent focus:ring-0 px-0 py-3 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600 text-base font-normal" placeholder="••••••••" type="password" value=""/>

<span class="material-symbols-outlined">brand_family</span>
</button>
<button class="size-12 rounded-full border border-slate-300 dark:border-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:border-primary transition-colors">
<span class="material-symbols-outlined">fingerprint</span>
</button>
</div>
</div>
<div class="p-6 text-center">
<p class="text-slate-500 dark:text-slate-500 text-[10px] uppercase tracking-tighter opacity-60">

            </p>
